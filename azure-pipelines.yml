trigger:
  branches:
    include:
      - main
      - dev

pr:
  branches:
    include:
      - main

pool:
  name: 'local-agent'

stages:
  - stage: CI
    displayName: 'Build & Test'
    jobs:
      - job: Frontend
        displayName: 'Frontend (Vite)'
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Use Node 20'

          - script: |
              node --version
              npm --version
            displayName: 'Verify Node & npm'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm run build
            displayName: 'Build (Vite)'
            env:
              VITE_SUPABASE_URL: $(VITE_SUPABASE_URL)
              VITE_SUPABASE_ANON_KEY: $(VITE_SUPABASE_ANON_KEY)

          - publish: dist
            artifact: frontend-dist
            displayName: 'Publish build artifact'

  - stage: CD
    displayName: 'Deploy to Azure'
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployFrontend
        displayName: 'Deploy to App Service'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: frontend-dist
                  displayName: 'Download build artifact'

                - task: PowerShell@2
                  displayName: 'Zip and deploy to Azure App Service'
                  inputs:
                    targetType: 'inline'
                    script: |
                      $sourcePath = "$(Pipeline.Workspace)/frontend-dist"
                      $zipPath = "$(Pipeline.Workspace)/deploy.zip"
                      Compress-Archive -Path "$sourcePath/*" -DestinationPath $zipPath -Force
                      $profile = '$(AZURE_WEBAPP_PUBLISH_PROFILE)'
                      [xml]$xml = $profile
                      $publishUrl = $xml.publishData.publishProfile[0].publishUrl
                      $username = $xml.publishData.publishProfile[0].userName
                      $password = $xml.publishData.publishProfile[0].userPWD
                      $base64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${username}:${password}"))
                      $headers = @{ Authorization = "Basic $base64" }
                      $apiUrl = "https://$publishUrl/api/zipdeploy"
                      Invoke-RestMethod -Uri $apiUrl -Method POST -Headers $headers -InFile $zipPath -ContentType "application/zip"
                      Write-Host "Deployment complete!"

  - stage: AIAgents
    displayName: 'AI Agent Analysis'
    dependsOn: CI
    condition: and(succeeded(), ne(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: RunAgents
        displayName: 'Run Multi-Agent Crew'
        steps:
          - checkout: self

          - script: pip install requests
            displayName: 'Install dependencies'

          - script: python agents/crew.py
            displayName: 'Run AI Agent Crew'
            env:
              GEMINI_API_KEY: $(GEMINI_API_KEY)
              GITHUB_TOKEN: $(GITHUB_TOKEN)

          - script: python agents/boards_agent.py
            displayName: 'Run Boards Agent'
            env:
              GEMINI_API_KEY: $(GEMINI_API_KEY)
              GITHUB_TOKEN: $(GITHUB_TOKEN)
              ADO_PAT: $(ADO_PAT)