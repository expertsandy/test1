trigger:
  branches:
    include:
      - main
      - dev

pr:
  branches:
    include:
      - main

pool:
  name: 'local-agent'

stages:
  - stage: CI
    displayName: 'Build & Test'
    jobs:
      - job: Frontend
        displayName: 'Frontend (Vite)'
        steps:
          - checkout: self

          - task: NodeTool@1
            inputs:
              versionSpec: '20.x'
            displayName: 'Use Node 20'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm run build
            displayName: 'Build (Vite)'

          - publish: dist
            artifact: frontend-dist
            displayName: 'Publish build artifact'