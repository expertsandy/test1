trigger:
  branches:
    include:
      - main
      - dev

pr:
  branches:
    include:
      - main

pool:
  name: 'local-agent'

stages:
  - stage: CI
    displayName: 'Build & Test'
    jobs:
      - job: Frontend
        displayName: 'Frontend (Vite)'
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Use Node 20'

          - script: |
              node --version
              npm --version
            displayName: 'Verify Node & npm'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm run build
            displayName: 'Build (Vite)'

          - publish: dist
            artifact: frontend-dist
            displayName: 'Publish build artifact'

  - stage: CD
    displayName: 'Deploy to Azure'
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployFrontend
        displayName: 'Deploy to App Service'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: frontend-dist
                  displayName: 'Download build artifact'

                - task: AzureRmWebAppDeployment@4
                  displayName: 'Deploy to jaishanidev-app'
                  inputs:
                    ConnectionType: 'PublishProfile'
                    PublishProfileContent: '$(AZURE_WEBAPP_PUBLISH_PROFILE)'
                    appName: 'jaishanidev-app'
                    packageForZip: '$(Pipeline.Workspace)/frontend-dist'